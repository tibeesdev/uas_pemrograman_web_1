<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportSpace - Register</title>
    <link rel="stylesheet" href="assets/style/style-register.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <nav class="navbar navbar-expand-lg d-flex flex-column flex-lg-row py-3">
        <div class="container-fluid d-flex flex-column flex-lg-row align-items-center gap-3">
            <div class="navbar-brand fw-bold m-0 ps-0 ps-lg-4 text-light">
                <strong style="font-size: x-large;">SportSpace</strong>
            </div>
            <div class="nav-divider"></div>
            <div class="d-flex flex-row justify-content-center justify-content-lg-end align-items-center w-100 pe-0 pe-lg-4">
                <ul class="navbar-nav mb-2 mb-lg-0 gap-3 text-center flex-row w-100 justify-content-center justify-content-lg-end align-items-center" id="navLinks">
                    <li class="nav-item"><a href="index.html" class="nav-link text-light">Beranda</a></li>
                    <li class="nav-item"><a href="jadwal.html" class="nav-link text-light">Jadwal</a></li>
                    <li class="nav-item"><a href="kontak.html" class="nav-link text-light">Kontak Admin</a></li>
                    <li class="nav-item border border-light border-3 border-opacity-75 rounded px-2"><a href="login.html" class="nav-link active text-light">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-register">
        <div class="container-form shadow rounded p-4 bg-white">
            <h2 class="text-center h4 mb-4 fw-bold text-dark">REGISTER PENGGUNA - SPORT SPACE</h2>

            <form id="formRegister" class="form-register">
                <div class="input-group mb-3 shadow-sm border rounded">
                    <span class="input-group-text bg-light border-0"><img src="assets/img/people.svg" alt="User" width="20"></span>
                    <input type="text" id="nama" class="form-control border-0 py-2 ps-2" placeholder="Nama Lengkap (Contoh : Budi Santoso)" required>
                </div>

                <div class="input-group mb-3 shadow-sm border rounded">
                    <span class="input-group-text bg-light border-0"><img src="assets/img/email.svg" alt="Email" width="20"></span>
                    <input type="email" id="email" class="form-control border-0 py-2 ps-2" placeholder="Alamat Email (Contoh : budi@gmail.com)" required>
                </div>

                <div class="input-group mb-3 shadow-sm border rounded">
                    <span class="input-group-text bg-light border-0"><img src="assets/img/sandi.svg" alt="Key" width="20"></span>
                    <input type="password" id="password" class="form-control border-0 py-2 ps-2" placeholder="Kata Sandi" required>
                    <span class="input-group-text bg-white border-0 toggle-password-btn"><img src="assets/img/eye.svg" alt="Show" class="icon-eye" width="20" style="cursor: pointer;"></span>
                </div>

                <div class="input-group mb-4 shadow-sm border rounded">
                    <span class="input-group-text bg-light border-0"><img src="assets/img/sandi.svg" alt="Key" width="20"></span>
                    <input type="password" id="konfirmasi_password" class="form-control border-0 py-2 ps-2" placeholder="Konfirmasi Kata Sandi" required>
                    <span class="input-group-text bg-white border-0 toggle-password-btn"><img src="assets/img/eye.svg" alt="Show" class="icon-eye" width="20" style="cursor: pointer;"></span>
                </div>

                <button type="submit" class="btn-daftar btn btn-primary w-100 fw-bold py-2 mb-3">DAFTAR SEKARANG</button>
                <p class="text-login text-center small m-0">Sudah Punya Akun? <a href="login.html" class="text-primary text-decoration-none fw-bold">Login di Sini</a></p>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/register.js"></script>
</body>
</html>
