<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportSpace - Jadwal</title>
    <link rel="stylesheet" href="assets/style/style-jadwal.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg d-flex flex-column flex-lg-row py-3">
        <div class="container-fluid d-flex flex-column flex-lg-row align-items-center gap-3">
            <div class="navbar-brand fw-bold m-0 ps-0 ps-lg-4 text-light">
                <strong style="font-size: x-large;">SportSpace</strong>
            </div>
            <div class="nav-divider"></div>

            <div class="d-flex flex-row justify-content-center justify-content-lg-end align-items-center w-100 pe-0 pe-lg-4">
                <ul class="navbar-nav mb-2 mb-lg-0 gap-3 text-center flex-row w-100 justify-content-center justify-content-lg-end align-items-center" id="navLinks">
                    <li class="nav-item"><a href="index.html" class="nav-link text-light">Beranda</a></li>
                    <li class="nav-item border border-light border-3 border-opacity-75 rounded px-2"><a href="jadwal.html" class="nav-link active text-light">Jadwal</a></li>
                    <li class="nav-item"><a href="kontak.html" class="nav-link text-light">Kontak Admin</a></li>
                    <li class="nav-item" id="authNavOption"><a href="login.html" class="nav-link text-light">LOGIN</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-jadwal my-4">
        <div class="sidebar-pilih">
            <section class="card-pilih shadow-sm rounded p-3 mb-3 bg-white">
                <label for="pilih-tanggal" class="label fw-bold text-secondary">Select date</label>
                <input type="date" id="pilih-tanggal" class="form-control input-custom mt-2">
            </section>

            <section class="card-pilih shadow-sm rounded p-3 mb-3 bg-white">
                <label for="jam-mulai" class="label fw-bold text-secondary">Jam Mulai</label>
                <input type="time" id="jam-mulai" class="form-control input-custom mt-2">
            </section>

            <section class="card-pilih shadow-sm rounded p-3 mb-3 bg-white">
                <label for="jam-berakhir" class="label fw-bold text-secondary">Jam Berakhir</label>
                <input type="time" id="jam-berakhir" class="form-control input-custom mt-2">
            </section>
        </div>

        <section class="status-lapangan shadow-sm rounded p-4 bg-white">
            <h2 class="h4 mb-3 border-bottom pb-2">Jadwal Lapangan</h2>
            <div class="grid-jam d-flex flex-wrap gap-2">
                <div class="item-jam border p-2 rounded bg-light">08:00 <span class="badge bg-success ms-1 tersedia">Tersedia</span></div>
                <div class="item-jam border p-2 rounded bg-light">09:00 <span class="badge bg-danger ms-1 penuh">Penuh</span></div>
                <div class="item-jam border p-2 rounded bg-light">10:00 <span class="badge bg-danger ms-1 penuh">Penuh</span></div>
                <div class="item-jam border p-2 rounded bg-light">11:00 <span class="badge bg-danger ms-1 penuh">Penuh</span></div>
                <div class="item-jam border p-2 rounded bg-light">12:00 <span class="badge bg-danger ms-1 penuh">Penuh</span></div>
                <div class="item-jam border p-2 rounded bg-light">13:00 <span class="badge bg-success ms-1 tersedia">Tersedia</span></div>
            </div>
        </section>

        <section class="ringkasan shadow-sm rounded p-4 bg-white text-center text-md-start">
            <div class="info">
                <h3 class="h5 fw-bold text-dark">Ringkasan Booking</h3>
                <p class="text-muted mb-2">2 Jam | 20:00 s.d 22:00</p>
                <span class="total h5 fw-bold text-primary">Total : Rp 200rb</span>
            </div>
            <button class="btn-pesan btn btn-primary btn-lg w-100 mt-3" id="btnPesan">Pesan Sekarang</button>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/navbar.js"></script>
    <script src="assets/js/jadwal.js"></script>
</body>
</html>
